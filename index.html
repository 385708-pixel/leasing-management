        // --- 現実の日付情報 ---
        const currentActualYear = new Date().getFullYear();
        const currentActualMonth = new Date().getMonth() + 1; // 1-12

        // 1ヶ月分の空データを作成する関数
        const createEmptyMonthStat = (year, month) => {
            return {
                month, 
                receiptDate: '', rentIncome: 0, 
                paymentDate: '', managementFee: 0, repairFee: 0, taxPayment: 0
            };
        };

        // --- 初期サンプルデータ ---
        const INITIAL_DATA = [];

        // --- ユーティリティ ---
        const getFiscalMonths = (fiscalYear, endMonth) => {
            const startMonth = (endMonth % 12) + 1;
            const months = [];
            for (let i = 0; i < 12; i++) {
                let m = startMonth + i;
                let y = fiscalYear;
                if (m > 12) { m -= 12; y += 1; }
                months.push({ year: y, month: m });
            }
            return months;
        };

        const CustomTooltip = ({ active, payload, labelActual, labelProjected, labelBalance }) => {
            if (active && payload && payload.length) {
                const actTotal = payload.find(p => p.dataKey === 'actualTotal')?.value;
                const projTotal = payload.find(p => p.dataKey === 'projectedTotal')?.value;
                const total = actTotal !== undefined && actTotal !== null ? actTotal : projTotal;
                const isProjected = (actTotal === undefined || actTotal === null) && projTotal !== undefined;

                return (
                <div className="bg-white border border-gray-200 rounded-lg px-3 py-2 shadow-lg">
                    <p className="text-slate-500 font-bold text-xs mb-1">{payload[0].payload.label} {isProjected ? labelProjected : labelActual}</p>
                    <p className={`font-black text-sm ${isProjected ? 'text-green-400' : 'text-green-600'}`}>
                    {labelBalance}: ¥{(total || 0).toLocaleString()}
                    </p>
                </div>
                );
            }
            return null;
        };

        const CircularProgress = ({ percentage, label }) => {
            const radius = 54;
            const circumference = 2 * Math.PI * radius;
            const strokeDashoffset = circumference - (percentage / 100) * circumference;

            return (
                <div className="relative inline-flex items-center justify-center w-48 h-48 sm:w-56 sm:h-56 md:w-64 md:h-64">
                <svg viewBox="0 0 144 144" className="transform -rotate-90 w-full h-full">
                    <circle cx="72" cy="72" r={radius} stroke="currentColor" strokeWidth="12" fill="transparent" className="text-gray-100" />
                    <circle cx="72" cy="72" r={radius} stroke="currentColor" strokeWidth="12" fill="transparent" strokeDasharray={circumference} strokeDashoffset={strokeDashoffset} strokeLinecap="round" className="text-indigo-600 transition-all duration-1000 ease-out" />
                </svg>
                <div className="absolute flex flex-col items-center justify-center text-indigo-700">
                    <span className="text-xs sm:text-sm md:text-base font-bold tracking-tighter mb-1 text-center px-2">{label}</span>
                    <span className="text-5xl sm:text-6xl md:text-7xl font-extrabold leading-none">{percentage}<span className="text-xl sm:text-2xl md:text-3xl font-bold">%</span></span>
                </div>
                </div>
            );
        };

        function App() {
            // LocalStorage から設定を読み込む
            const loadSettings = () => {
                const savedSettings = localStorage.getItem(STORAGE_KEY_SETTINGS);
                if (savedSettings) {
                    try {
                        return { type: 'individual', fiscalMonth: 12, language: 'ja', reportEmail: '', ...JSON.parse(savedSettings) };
                    } catch (e) {
                        console.error("設定の読み込みに失敗しました", e);
                    }
                }
                return { type: 'individual', fiscalMonth: 12, language: 'ja', reportEmail: '' };
            };

            const [appSettings, setAppSettings] = useState(loadSettings());

            // 設定が変更されたら LocalStorage に保存
            useEffect(() => {
                localStorage.setItem(STORAGE_KEY_SETTINGS, JSON.stringify(appSettings));
            }, [appSettings]);

            // 翻訳関数
            const t = (key) => TRANSLATIONS[appSettings.language][key] || key;

            // LocalStorage から物件データを読み込む
            const loadProperties = () => {
                const savedProperties = localStorage.getItem(STORAGE_KEY_PROPERTIES);
                if (savedProperties) {
                    try {
                        return JSON.parse(savedProperties);
                    } catch (e) {
                        console.error("物件データの読み込みに失敗しました", e);
                    }
                }
                return INITIAL_DATA;
            };

            const [properties, setProperties] = useState(loadProperties());

            // 物件データが変更されたら LocalStorage に保存
            useEffect(() => {
                localStorage.setItem(STORAGE_KEY_PROPERTIES, JSON.stringify(properties));
            }, [properties]);

            const [currentView, setCurrentView] = useState('home');
            const [selectedPropertyId, setSelectedPropertyId] = useState(null);
            
            const [confirmModal, setConfirmModal] = useState({ isOpen: false, title: '', message: '', onConfirm: () => {}, isDestructive: false });
            
            // クラウド同期・PDF送信用のステート
            const [syncMessage, setSyncMessage] = useState('');

            const [homeTargetYear, setHomeTargetYear] = useState(currentActualYear);
            const [homeTargetMonth, setHomeTargetMonth] = useState(currentActualMonth);

            // カレンダー月から、表示対象の「事業年度」を計算する
            const currentHomeFiscalYear = useMemo(() => {
                const startMonth = (appSettings.fiscalMonth % 12) + 1;
                if (startMonth === 1) return homeTargetYear;
                return homeTargetMonth < startMonth ? homeTargetYear - 1 : homeTargetYear;
            }, [homeTargetYear, homeTargetMonth, appSettings.fiscalMonth]);

            const [selectedYear, setSelectedYear] = useState(currentHomeFiscalYear);
            const [detailTab, setDetailTab] = useState('summary');
            const [expandedStatId, setExpandedStatId] = useState(null);
            
            useEffect(() => {
                setSelectedYear(currentHomeFiscalYear);
            }, [currentHomeFiscalYear]);

            const [formData, setFormData] = useState({ 
                name: '', status: 'occupied', acquisitionPrice: '', assumedRent: ''
            });

            // --- クラウド保存・読み込みロジック ---
            const handleSaveToCloud = async () => {
                setSyncMessage(t('saving'));
                try {
                    await fetch(WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(properties)
                    });
                    setSyncMessage(t('saveSuccess'));
                    setTimeout(() => setSyncMessage(''), 3000);
                } catch (error) {
                    console.error("Save Error:", error);
                    setSyncMessage(t('saveError'));
                    setTimeout(() => setSyncMessage(''), 3000);
                }
            };

            const handleLoadFromCloud = async () => {
                setSyncMessage(t('loading'));
                try {
                    const response = await fetch(WEB_APP_URL);
                    const data = await response.json();
                    if (Array.isArray(data) && data.length > 0) {
                        setProperties(data);
                        setSyncMessage(t('loadSuccess'));
                    } else {
                        setSyncMessage(t('noData'));
                    }
                    setTimeout(() => setSyncMessage(''), 3000);
                } catch (error) {
                    console.error("Load Error:", error);
                    setSyncMessage(t('loadError'));
                    setTimeout(() => setSyncMessage(''), 3000);
                }
            };

            // --- PDFメール送信ロジック ---
            const handleSendReport = async (elementId, title) => {
                if (!appSettings.reportEmail) {
                    setSyncMessage(t('emailRequired'));
                    setTimeout(() => setSyncMessage(''), 3000);
                    return;
                }

                const element = document.getElementById(elementId);
                if (!element) return;

                setSyncMessage(t('sendingReport'));

                // PDF生成時のレイアウト崩れ（ResponsiveContainerの幅計算エラー）を防ぐため、一時的に幅を固定値にする
                const originalWidth = element.style.width;
                element.style.width = `${element.offsetWidth}px`;

                const opt = {
                    margin:       10, // mm単位での余白を設定
                    filename:     `${title}.pdf`,
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2, useCORS: true, scrollY: 0, windowWidth: element.scrollWidth },
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'landscape' }
                };

                try {
                    // html2pdfで要素をPDF化し、base64データURLとして取得
                    const pdfBase64 = await window.html2pdf().set(opt).from(element).outputPdf('datauristring');
                    
                    // 幅の固定を解除
                    element.style.width = originalWidth;

                    const payload = {
                        action: 'sendEmail',
                        email: appSettings.reportEmail,
                        title: title,
                        pdfData: pdfBase64
                    };

                    await fetch(WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload)
                    });

                    setSyncMessage(t('sendReportSuccess'));
                    setTimeout(() => setSyncMessage(''), 3000);
                } catch (error) {
                    // 幅の固定を解除 (エラー時も)
                    element.style.width = originalWidth;
                    console.error("PDF Send Error:", error);
                    setSyncMessage(t('sendReportError'));
                    setTimeout(() => setSyncMessage(''), 3000);
                }
            };

            // --- 計算ロジック ---
            const overallSummary = useMemo(() => {
                if (properties.length === 0) return { occupancyRate: 0, targetMonthTotalIncome: 0 };
                const occupiedCount = properties.filter(p => p.status === 'occupied').length;
                const occupancyRate = Math.round((occupiedCount / properties.length) * 100);
                
                let targetMonthTotalIncome = 0;
                properties.forEach(p => {
                    const stats = p.yearlyStats[homeTargetYear];
                    if (stats) {
                        const targetStat = stats.find(s => s.month === homeTargetMonth);
                        if (targetStat) targetMonthTotalIncome += Number(targetStat.rentIncome);
                    }
                });
                return { occupancyRate, targetMonthTotalIncome };
            }, [properties, homeTargetYear, homeTargetMonth]);

            // グラフ用のデータと年間総額・純額をまとめて計算
            const overallChartInfo = useMemo(() => {
                if (properties.length === 0) return { chartData: [], annualTotalIncome: 0, annualNetIncome: 0 };
                
                const fiscalMonths = getFiscalMonths(currentHomeFiscalYear, appSettings.fiscalMonth);
                const chartData = [];
                let lastActualIndex = -1;
                fiscalMonths.forEach(({ year, month }, index) => {
                    if (year < currentActualYear || (year === currentActualYear && month <= currentActualMonth)) { lastActualIndex = index; }
                });

                let annualTotalIncome = 0;
                let annualTotalExpense = 0;

                fiscalMonths.forEach(({ year, month }, index) => {
                    let totalIncome = 0; let totalExpense = 0;
                    let projectedTotalIncome = 0; let projectedTotalExpense = 0;
                    const isPastOrCurrent = index <= lastActualIndex;
                    const isLastActual = index === lastActualIndex;

                    properties.forEach(p => {
                        const yearStats = p.yearlyStats[year] || [];
                        const stat = yearStats.find(s => s.month === month) || createEmptyMonthStat(year, month);
                        
                        const expense = Number(stat.managementFee) + Number(stat.repairFee) + Number(stat.taxPayment);
                        let income = Number(stat.rentIncome);
                        if (!isPastOrCurrent && p.status === 'occupied' && income === 0) { income = p.assumedRent || 0; }
                        
                        if (isPastOrCurrent) { totalIncome += income; totalExpense += expense; } 
                        else { projectedTotalIncome += income; projectedTotalExpense += expense; }
                    });

                    annualTotalIncome += totalIncome + projectedTotalIncome;
                    annualTotalExpense += totalExpense + projectedTotalExpense;

                    const total = (isPastOrCurrent ? totalIncome : projectedTotalIncome) - (isPastOrCurrent ? totalExpense : projectedTotalExpense);

                    if (isPastOrCurrent) {
                        chartData.push({ label: `${month}${t('month')}`, actualIncome: totalIncome, actualExpense: -totalExpense, actualTotal: total, projectedTotal: isLastActual ? total : null });
                    } else {
                        chartData.push({ label: `${month}${t('month')}`, projectedIncome: projectedTotalIncome, projectedExpense: -projectedTotalExpense, actualTotal: null, projectedTotal: total });
                    }
                });
                
                return { 
                    chartData, 
                    annualTotalIncome, 
                    annualNetIncome: annualTotalIncome - annualTotalExpense 
                };
            }, [properties, currentHomeFiscalYear, appSettings.fiscalMonth, appSettings.language]);

            const selectedProperty = useMemo(() => properties.find(p => p.id === selectedPropertyId), [properties, selectedPropertyId]);

            const performanceData = useMemo(() => {
                if (!selectedProperty) return null;
                const fiscalMonths = getFiscalMonths(selectedYear, appSettings.fiscalMonth);
                let actualIncome = 0; let actualExpenseTotal = 0; let actualOperatingExpense = 0; let actualMonthsCount = 0;
                let projectedIncome = 0; let projectedExpenseTotal = 0; let projectedOperatingExpense = 0;
                const chartData = []; const tableData = [];
                let lastActualIndex = -1;

                fiscalMonths.forEach(({ year, month }, index) => {
                    if (year < currentActualYear || (year === currentActualYear && month <= currentActualMonth)) { lastActualIndex = index; }
                });

                fiscalMonths.forEach(({ year, month }, index) => {
                    const yearStats = selectedProperty.yearlyStats[year] || [];
                    const stat = yearStats.find(s => s.month === month) || createEmptyMonthStat(year, month);
                    
                    const operatingExpense = Number(stat.managementFee) + Number(stat.repairFee) + Number(stat.taxPayment);
                    const totalExpense = operatingExpense;
                    
                    const isPastOrCurrent = index <= lastActualIndex;
                    const isLastActual = index === lastActualIndex;

                    let income = Number(stat.rentIncome);
                    if (!isPastOrCurrent && selectedProperty.status === 'occupied' && income === 0) { income = selectedProperty.assumedRent || 0; }
                    const total = income - totalExpense;

                    if (isPastOrCurrent) {
                        actualIncome += income; actualOperatingExpense += operatingExpense; actualExpenseTotal += totalExpense; actualMonthsCount++;
                        chartData.push({ label: `${month}${t('month')}`, actualIncome: income, actualExpense: -totalExpense, actualTotal: total, projectedTotal: isLastActual ? total : null });
                    } else {
                        projectedIncome += income; projectedOperatingExpense += operatingExpense; projectedExpenseTotal += totalExpense;
                        chartData.push({ label: `${month}${t('month')}`, projectedIncome: income, projectedExpense: -totalExpense, actualTotal: null, projectedTotal: total });
                    }
                    tableData.push({ actualYear: year, isPastOrCurrent, ...stat });
                });

                const expectedAnnualIncome = actualIncome + projectedIncome;
                const expectedAnnualOperatingExpense = actualOperatingExpense + projectedOperatingExpense;
                const expectedAnnualExpenseTotal = actualExpenseTotal + projectedExpenseTotal;
                const expectedAnnualCashFlow = expectedAnnualIncome - expectedAnnualExpenseTotal;
                const acquisitionPrice = Number(selectedProperty.acquisitionPrice);
                const expectedGrossYield = acquisitionPrice > 0 ? ((expectedAnnualIncome / acquisitionPrice) * 100).toFixed(2) : 0;
                
                // 実質利回り(NOI): 収入から運営経費のみを引く
                const expectedNetYield = acquisitionPrice > 0 ? (((expectedAnnualIncome - expectedAnnualOperatingExpense) / acquisitionPrice) * 100).toFixed(2) : 0;
                const actualCashFlow = actualIncome - actualExpenseTotal;

                return { 
                    chartData, tableData, actualMonthsCount, actualIncome, actualOperatingExpense, actualExpenseTotal, actualCashFlow, 
                    expectedAnnualIncome, expectedAnnualOperatingExpense, expectedAnnualExpenseTotal, expectedAnnualCashFlow, expectedGrossYield, expectedNetYield 
                };
            }, [selectedProperty, selectedYear, appSettings.fiscalMonth, appSettings.language]);

            // --- アクション ---
            const handleSaveProperty = (e) => {
                e.preventDefault();
                const isNew = !selectedPropertyId;
                const newProperty = {
                    id: selectedPropertyId || Date.now().toString(), name: formData.name, status: formData.status,
                    acquisitionPrice: Number(formData.acquisitionPrice), assumedRent: Number(formData.assumedRent),
                    yearlyStats: isNew ? { 
                        [currentActualYear]: Array.from({length: 12}, (_, i) => 
                            createEmptyMonthStat(currentActualYear, i + 1)
                        ) 
                    } : selectedProperty.yearlyStats
                };
                setProperties(isNew ? [...properties, newProperty] : properties.map(p => p.id === selectedPropertyId ? newProperty : p));
                setCurrentView('home');
            };

            const handleDeleteProperty = (id) => {
                setConfirmModal({
                    isOpen: true, title: t('deletePropTitle'), message: t('deletePropMsg'), isDestructive: true,
                    onConfirm: () => { setProperties(properties.filter(p => p.id !== id)); setCurrentView('home'); }
                });
            };

            const handleUpdateStat = (targetYear, targetMonth, field, value) => {
                const updatedProperties = properties.map(p => {
                    if (p.id !== selectedProperty.id) return p;
                    let yearStats = p.yearlyStats[targetYear] ? [...p.yearlyStats[targetYear]] : Array.from({length: 12}, (_, i) => createEmptyMonthStat(targetYear, i + 1));
                    const monthIndex = yearStats.findIndex(s => s.month === targetMonth);
                    if (monthIndex === -1) return p;

                    const targetStat = { ...yearStats[monthIndex] };
                    if (field === 'receiptDate' || field === 'paymentDate') { targetStat[field] = value; } 
                    else { targetStat[field] = Number(value); }
                    
                    yearStats[monthIndex] = targetStat;
                    return { ...p, yearlyStats: { ...p.yearlyStats, [targetYear]: yearStats } };
                });
                setProperties(updatedProperties);
            };

            const confirmAutoFill = (stat) => {
                setConfirmModal({
                    isOpen: true, title: `${String(stat.actualYear).slice(2)}${t('year')}${stat.month}${t('month')} ${t('autoFillTitle')}`, message: t('autoFillMsg'), isDestructive: false,
                    onConfirm: () => executeAutoFill(stat)
                });
            };

            const executeAutoFill = (stat) => {
                const currentYear = stat.actualYear; const currentMonth = stat.month;
                let prevYear = currentYear; let prevMonth = currentMonth - 1;
                if (prevMonth === 0) { prevMonth = 12; prevYear -= 1; }
                const prevYearStats = selectedProperty.yearlyStats[prevYear] || [];
                const prevStat = prevYearStats.find(s => s.month === prevMonth);

                const formatMonth = String(currentMonth).padStart(2, '0');
                const calculateSafeDate = (prevDateStr) => {
                    if (!prevDateStr) return '';
                    const day = parseInt(prevDateStr.split('-')[2], 10);
                    if (!isNaN(day)) {
                        const lastDayOfMonth = new Date(currentYear, currentMonth, 0).getDate();
                        return `${currentYear}-${formatMonth}-${String(Math.min(day, lastDayOfMonth)).padStart(2, '0')}`;
                    }
                    return '';
                };

                const updatedStat = {
                    ...stat, receiptDate: calculateSafeDate(prevStat?.receiptDate), rentIncome: selectedProperty.assumedRent || 0,
                    paymentDate: calculateSafeDate(prevStat?.paymentDate), managementFee: 0, repairFee: 0, taxPayment: 0
                };

                const updatedProperties = properties.map(p => {
                    if (p.id !== selectedProperty.id) return p;
                    let yearStats = p.yearlyStats[currentYear] ? [...p.yearlyStats[currentYear]] : Array.from({length: 12}, (_, i) => createEmptyMonthStat(currentYear, i + 1));
                    const monthIndex = yearStats.findIndex(s => s.month === currentMonth);
                    if (monthIndex > -1) { yearStats[monthIndex] = updatedStat; }
                    return { ...p, yearlyStats: { ...p.yearlyStats, [currentYear]: yearStats } };
                });
                setProperties(updatedProperties);
            };

            const confirmBulkAutoFill = () => {
                setConfirmModal({
                    isOpen: true, title: `${homeTargetYear}${t('year')}${homeTargetMonth}${t('month')} ${t('bulkUpdateTitle')}`, message: t('bulkUpdateMsg'), isDestructive: false,
                    onConfirm: () => executeBulkAutoFill()
                });
            };

            const executeBulkAutoFill = () => {
                const updatedProperties = properties.map(p => {
                    let prevYear = homeTargetYear; let prevMonth = homeTargetMonth - 1;
                    if (prevMonth === 0) { prevMonth = 12; prevYear -= 1; }
                    const prevStat = (p.yearlyStats[prevYear] || []).find(s => s.month === prevMonth);

                    const formatMonth = String(homeTargetMonth).padStart(2, '0');
                    const calculateSafeDate = (prevDateStr) => {
                        if (!prevDateStr) return '';
                        const day = parseInt(prevDateStr.split('-')[2], 10);
                        if (!isNaN(day)) {
                            const lastDayOfMonth = new Date(homeTargetYear, homeTargetMonth, 0).getDate();
                            return `${homeTargetYear}-${formatMonth}-${String(Math.min(day, lastDayOfMonth)).padStart(2, '0')}`;
                        }
                        return '';
                    };

                    const updatedStat = {
                        month: homeTargetMonth, receiptDate: calculateSafeDate(prevStat?.receiptDate), rentIncome: p.assumedRent || 0,
                        paymentDate: calculateSafeDate(prevStat?.paymentDate), managementFee: 0, repairFee: 0, taxPayment: 0
                    };

                    let yearStats = p.yearlyStats[homeTargetYear] ? [...p.yearlyStats[homeTargetYear]] : Array.from({length: 12}, (_, i) => createEmptyMonthStat(homeTargetYear, i + 1));
                    const monthIndex = yearStats.findIndex(s => s.month === homeTargetMonth);
                    if (monthIndex > -1) { yearStats[monthIndex] = updatedStat; }
                    return { ...p, yearlyStats: { ...p.yearlyStats, [homeTargetYear]: yearStats } };
                });
                setProperties(updatedProperties);
            };

            const openForm = (property = null) => {
                if (property) {
                    setSelectedPropertyId(property.id);
                    setFormData({ 
                        name: property.name, status: property.status || 'occupied', acquisitionPrice: property.acquisitionPrice, assumedRent: property.assumedRent || ''
                    });
                } else {
                    setSelectedPropertyId(null);
                    setFormData({ name: '', status: 'occupied', acquisitionPrice: '', assumedRent: '' });
                }
                setCurrentView('form');
            };

            // --- 画面: ホーム ---
            const renderHome = () => (
                <div className="max-w-5xl mx-auto p-4 sm:p-6 pb-20">
                <div className="flex justify-between items-center mb-6">
                    <h1 className="text-xl sm:text-2xl font-black text-slate-800 flex items-center gap-2">
                    <div className="w-8 h-8 bg-indigo-700 text-white rounded-lg flex items-center justify-center">
                        <Home size={20} />
                    </div>
                    {t('appTitle')}
                    </h1>
                    <div className="flex gap-2 sm:gap-3">
                    <button onClick={() => setCurrentView('settings')} className="p-2 text-gray-500 hover:text-indigo-600 bg-white rounded-lg shadow-sm border border-gray-200 transition-colors"><SettingsIcon size={20} /></button>
                    <button onClick={() => openForm()} className="bg-indigo-600 hover:bg-indigo-700 text-white px-3 sm:px-4 py-2 rounded-lg font-bold flex items-center gap-2 transition-colors shadow-sm"><Plus size={18} /> <span className="hidden sm:inline">{t('addProperty')}</span></button>
                    </div>
                </div>

                <div className="bg-white rounded-2xl sm:rounded-3xl shadow-sm border border-gray-100 p-6 md:p-8 mb-8 flex flex-col md:flex-row items-center relative overflow-hidden gap-6 md:gap-0">
                    <div className="absolute top-0 right-0 w-32 h-32 sm:w-48 sm:h-48 md:w-64 md:h-64 bg-indigo-50/50 rounded-bl-full -z-0 pointer-events-none"></div>
                    
                    <div className="relative z-10 w-full md:w-1/2 flex flex-col items-center justify-center border-b md:border-b-0 md:border-r border-gray-100 pb-6 md:pb-0 md:pr-6">
                        <CircularProgress percentage={overallSummary.occupancyRate} label={t('overallOccupancy')} />
                        <div className="mt-4 sm:mt-6 md:mt-8 text-xs sm:text-sm md:text-base text-gray-500 flex flex-row items-center gap-3 sm:gap-5 md:gap-6 font-medium">
                            <span>{t('totalStr')} <strong className="text-slate-800 font-black text-sm sm:text-lg md:text-xl">{properties.length}</strong> {t('items')}</span>
                            <span className="text-gray-300">|</span>
                            <span className="flex items-center gap-1 sm:gap-1.5"><CheckCircle2 size={16} className="w-4 h-4 sm:w-5 sm:h-5 md:w-6 md:h-6 text-green-500"/> <strong className="text-slate-800 font-black text-sm sm:text-lg md:text-xl">{properties.filter(p=>p.status==='occupied').length}</strong> {t('items')}</span>
                        </div>
                    </div>

                    <div className="relative z-10 w-full md:w-1/2 flex flex-col justify-center pt-2 md:pt-0 pl-0 md:pl-8">
                        <div className="flex flex-col xl:flex-row xl:items-center justify-start xl:justify-between gap-3 sm:gap-4 mb-4 sm:mb-6">
                            <div className="inline-flex items-center bg-white rounded-full p-1 border border-gray-200 shadow-sm self-start">
                                <button onClick={() => {
                                    if (homeTargetMonth === 1) { setHomeTargetYear(y=>y-1); setHomeTargetMonth(12); }
                                    else { setHomeTargetMonth(m=>m-1); }
                                }} className="p-1.5 sm:p-2 rounded-full hover:bg-gray-50 text-gray-500 hover:text-indigo-600 transition-all"><ChevronLeft size={16} className="w-4 h-4 sm:w-5 sm:h-5"/></button>
                                <span className="px-2 sm:px-3 text-sm sm:text-sm md:text-base font-black text-slate-700 tracking-tight whitespace-nowrap">{homeTargetYear}{t('year')} {homeTargetMonth}{t('month')}</span>
                                <button onClick={() => {
                                    if (homeTargetMonth === 12) { setHomeTargetYear(y=>y+1); setHomeTargetMonth(1); }
                                    else { setHomeTargetMonth(m=>m+1); }
                                }} className="p-1.5 sm:p-2 rounded-full hover:bg-gray-50 text-gray-500 hover:text-indigo-600 transition-all"><ChevronRight size={16} className="w-4 h-4 sm:w-5 sm:h-5"/></button>
                            </div>
                            
                            <button onClick={confirmBulkAutoFill} className="group flex justify-center items-center gap-1 text-xs sm:text-xs md:text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 px-3 py-2 sm:px-4 sm:py-2 md:px-5 md:py-2.5 rounded-full transition-all shadow-sm self-start whitespace-nowrap">
                            <Zap size={14} className="w-3.5 h-3.5 sm:w-3.5 sm:h-3.5 md:w-4 md:h-4 text-white fill-indigo-400 group-hover:fill-indigo-300 transition-colors" /> 
                            <span>{t('bulkUpdate')}</span>
                            </button>
                        </div>
                        
                        <div className="bg-white/60 backdrop-blur-sm p-4 sm:p-4 md:p-5 rounded-xl sm:rounded-xl md:rounded-2xl border border-gray-100 shadow-sm self-start w-full md:w-auto">
                            <div className="text-[10px] sm:text-[10px] md:text-xs font-bold text-gray-500 mb-1 tracking-widest uppercase">{t('totalRentIncome')}</div>
                            <div className="text-3xl sm:text-3xl md:text-4xl lg:text-5xl font-black text-indigo-700 tracking-tight flex items-baseline gap-1 sm:gap-1 md:gap-2 truncate">
                            <span className="text-xl sm:text-lg md:text-xl lg:text-2xl text-indigo-400 font-bold">¥</span>
                            {overallSummary.targetMonthTotalIncome.toLocaleString()}
                            </div>
                        </div>
                    </div>
                </div>

                {properties.length > 0 && (
                    <div id="home-report" className="bg-white rounded-2xl shadow-sm border border-gray-200 p-5 mb-8">
                    <div className="flex flex-col xl:flex-row justify-between items-start xl:items-center mb-6 gap-4">
                        <h2 className="text-sm font-bold text-gray-700 flex items-center whitespace-nowrap">
                            {currentHomeFiscalYear}{t('fiscalYear')} {t('overallTrend')}
                            <span className="text-[10px] font-normal text-gray-400 ml-2">{t('actualAndProjected')}</span>
                        </h2>
                        <div className="flex flex-wrap items-center gap-3">
                            <div className="flex flex-wrap gap-4 bg-gray-50 px-4 py-2 rounded-xl border border-gray-100">
                                <div className="text-xs">
                                    <span className="text-gray-500 block sm:inline mb-0.5 sm:mb-0 mr-1">{t('annualTotalIncome')}:</span>
                                    <span className="font-bold text-slate-800 text-sm">¥{overallChartInfo.annualTotalIncome.toLocaleString()}</span>
                                </div>
                                <div className="text-xs border-l border-gray-200 pl-4">
                                    <span className="text-gray-500 block sm:inline mb-0.5 sm:mb-0 mr-1">{t('annualNetIncome')}:</span>
                                    <span className="font-black text-indigo-600 text-sm">¥{overallChartInfo.annualNetIncome.toLocaleString()}</span>
                                </div>
                            </div>
                            <button 
                                data-html2canvas-ignore="true"
                                onClick={() => handleSendReport('home-report', `${currentHomeFiscalYear}年度_全体収支レポート`)}

                            </button>

                    </div>
                    <div style={{ height: '200px', width: '100%' }}>
                        <ResponsiveContainer width="100%" height="100%">

                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                            <XAxis dataKey="label" axisLine={false} tickLine={false} tick={{ fontSize: 10, fill: '#64748b' }} dy={10} />
                            <YAxis axisLine={false} tickLine={false} tick={{ fontSize: 10, fill: '#64748b' }} tickFormatter={(val) => val === 0 ? '0' : `${Math.abs(val) / 10000}万`} width={40} />
                            <Tooltip content={<CustomTooltip labelActual={t('actualDesc')} labelProjected={t('projectedDesc')} labelBalance={t('totalBalance')} />} cursor={{fill: '#f8fafc'}} />

                            <Bar dataKey="actualExpense" fill="#f87171" radius={[0, 0, 2, 2]} barSize={12} isAnimationActive={false} />

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-5">
                    {properties.map(p => {
                        const isOccupied = p.status === 'occupied';
                        const yearData = p.yearlyStats[homeTargetYear] || [];
                        const targetStat = yearData.find(s => s.month === homeTargetMonth);
                        const targetRent = targetStat ? targetStat.rentIncome : 0;

                        return (
                        <div key={p.id} className="bg-white rounded-xl shadow-sm border border-gray-200 p-5 hover:shadow-md transition-all flex flex-col h-full group relative overflow-hidden">

                            <div className="flex justify-between items-start mb-4 pl-3">
                            <div>
                                <h2 className="text-lg font-bold text-gray-800 mb-1">{p.name}</h2>

                                            : <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs font-bold bg-gray-50 text-gray-600 border border-gray-200"><XCircle size={12}/> {t('vacant')}</span>}

                            <div className="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                <button onClick={() => openForm(p)} className="text-gray-400 hover:text-indigo-600 bg-gray-50 p-1.5 rounded"><Edit2 size={16}/></button>
                                <button onClick={() => handleDeleteProperty(p.id)} className="text-gray-400 hover:text-red-600 bg-gray-50 p-1.5 rounded"><Trash2 size={16}/></button>
                            </div>

                            <div className="pl-3 mb-5 flex-1">
                            <div className="bg-slate-50 rounded-lg p-3 border border-slate-100 flex justify-between items-center">
                                <span className="text-sm font-bold text-slate-500">{homeTargetMonth}{t('monthPortion')}</span>
                                <span className="text-lg font-black text-slate-800">¥{targetRent.toLocaleString()}</span>
                            </div>

                            <div className="pl-3 mt-auto">

                            </button>
                            </div>
                        </div>

                        <h2 className="text-lg font-bold text-gray-800 mb-4 border-b border-gray-100 pb-2 flex items-center gap-2">
                            <Send size={20} className="text-indigo-600"/> レポート送信設定
                        </h2>
                        <div className="space-y-4">
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">{t('reportEmail')}</label>

                                    value={appSettings.reportEmail} 
                                    onChange={(e) => setAppSettings({...appSettings, reportEmail: e.target.value})}

                                    className="w-full sm:w-96 border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none bg-white font-bold text-gray-800"

                                <p className="text-xs text-gray-500 mt-2">※ダッシュボードのPDFレポートを送信する宛先です。</p>
                            </div>
                        </div>
                    </div>

                    <div>
                        <h2 className="text-lg font-bold text-gray-800 mb-4 border-b border-gray-100 pb-2 flex items-center gap-2">
                            <Cloud size={20} className="text-indigo-600"/> {t('cloudSync')}
                        </h2>
                        <div className="space-y-4">

                                <button

                                    <UploadCloud size={18} /> {t('saveToCloud')}
                                </button>
                                <button 
                                    onClick={handleLoadFromCloud}
                                    className="flex-1 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-bold py-3 px-4 rounded-xl shadow-sm transition-colors flex items-center justify-center gap-2"
                                >
                                    <DownloadCloud size={18} /> {t('loadFromCloud')}
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* 言語設定 */}
                    <div>
                        <h2 className="text-lg font-bold text-gray-800 mb-4 border-b border-gray-100 pb-2 flex items-center gap-2">
                            <Globe size={20} className="text-indigo-600"/> {t('languageSettings')}
                        </h2>
                        <div className="flex flex-col sm:flex-row gap-4 sm:gap-6 bg-gray-50 p-4 rounded-xl border border-gray-100">
                            <label className="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="language" value="ja" checked={appSettings.language === 'ja'} 
                                onChange={() => setAppSettings({...appSettings, language: 'ja'})} 
                                className="w-5 h-5 text-indigo-600 focus:ring-indigo-500" />
                            <span className="font-bold text-gray-800">{t('japanese')}</span>
                            </label>
                            <label className="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="language" value="tr" checked={appSettings.language === 'tr'} 
                                onChange={() => setAppSettings({...appSettings, language: 'tr'})} 
                                className="w-5 h-5 text-indigo-600 focus:ring-indigo-500" />
                            <span className="font-bold text-gray-800">{t('turkish')}</span>
                            </label>
                        </div>
                    </div>

                    {/* 法人設定 */}
                    <div>
                    <h2 className="text-lg font-bold text-gray-800 mb-4 border-b border-gray-100 pb-2 flex items-center gap-2">

                    </h2>
                    <div className="space-y-6">

                        <label className="block text-sm font-bold text-gray-700 mb-3">{t('userType')}</label>

                            <label className="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="userType" value="individual" checked={appSettings.type === 'individual'}

                                className="w-5 h-5 text-indigo-600 focus:ring-indigo-500" />

                            </label>
                            <label className="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="userType" value="corporate" checked={appSettings.type === 'corporate'} 
                                onChange={() => setAppSettings({...appSettings, type: 'corporate'})} 
                                className="w-5 h-5 text-indigo-600 focus:ring-indigo-500" />
                            <span className="font-bold text-gray-800">{t('corporate')}</span>
                            </label>
                        </div>
                        <p className="text-xs text-gray-500 mt-2">{t('fiscalMonthNote')}</p>
                        </div>

                        {appSettings.type === 'corporate' && (
                        <div className="animate-in fade-in slide-in-from-top-2">
                            <label className="block text-sm font-bold text-gray-700 mb-2">{t('corporateFiscalMonth')}</label>
                            <select 
                            value={appSettings.fiscalMonth} 
                            onChange={(e) => setAppSettings({...appSettings, fiscalMonth: Number(e.target.value)})}

                            >
                            {Array.from({length: 12}, (_, i) => i + 1).map(m => (
                                <option key={m} value={m}>{m}{t('fiscalMonthOpt')} {(m % 12) + 1}{t('month')})</option>
                            ))}
                            </select>
                            <div className="mt-3 bg-indigo-50 text-indigo-800 p-3 rounded-lg text-sm flex gap-2">
                            <Info size={16} className="shrink-0 mt-0.5" />
                            <p>{t('fiscalMonthDesc')}</p>
                            </div>
                        </div>
                        )}
                    </div>
                    </div>
                </div>
                </div>
            );

            const renderForm = () => (
                <div className="max-w-2xl mx-auto p-4 sm:p-6 pb-20">
                <div className="flex items-center mb-6">
                    <button onClick={() => setCurrentView('home')} className="mr-4 text-gray-500 hover:text-indigo-600 bg-white p-2 rounded-full shadow-sm">
                    <ChevronLeft size={24} />

                    <h1 className="text-2xl font-black text-slate-800">{selectedPropertyId ? t('editProperty') : t('newProperty')}</h1>
                </div>

                    <div>
                    <label className="block text-sm font-bold text-gray-700 mb-1">{t('propName')}</label>
                    <input required type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-500 outline-none" />
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label className="block text-sm font-bold text-gray-700 mb-1">{t('status')}</label>
                        <select value={formData.status} onChange={e => setFormData({...formData, status: e.target.value})} className="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-500 outline-none bg-white">
                        <option value="occupied">{t('occupied')}</option><option value="vacant">{t('vacant')}</option>
                        </select>
                    </div>
                    <div>
                        <label className="block text-sm font-bold text-gray-700 mb-1">{t('acquisitionPrice')}</label>
                        <input required type="number" min="0" value={formData.acquisitionPrice} onChange={e => setFormData({...formData, acquisitionPrice: e.target.value})} className="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-500 outline-none" />
                    </div>
                    </div>
                    
                    <div className="bg-blue-50/50 p-4 rounded-xl border border-blue-100">
                    <label className="block text-sm font-bold text-gray-700 mb-1 flex items-center gap-1">{t('assumedRent')} <span className="text-xs font-normal text-gray-500">{t('monthYen')}</span></label>

                    <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg flex items-center justify-center gap-2">
                        <Save size={18} /> {selectedPropertyId ? t('save') : t('register')}
                    </button>
                    </div>
                </form>
                </div>

                return (

                    <div className="flex items-center">
                        <button onClick={() => setCurrentView('home')} className="mr-4 text-gray-500 hover:text-indigo-600 bg-white p-2 rounded-full shadow-sm">
                        <ChevronLeft size={24} />
                        </button>
                        <div>
                        <h1 className="text-2xl font-black text-slate-800 leading-tight">{selectedProperty.name}</h1>
                        <span className="text-sm font-bold text-gray-500">{t('incomeDashboard')}</span>

                    </div>

                        <ChevronRight size={20} />

                                onClick={() => handleSendReport('detail-report', `${selectedProperty.name}_${selectedYear}年度_収支レポート`)}

                                <Send size={14} /> {t('sendPdf')}
                            </button>
                        </div>

                            <div className="flex justify-between items-end mb-6">
                                <div>
                                <div className="text-sm text-gray-500 font-bold mb-1">{selectedYear}{t('fiscalYear')} {t('cumulativeCashFlow')}</div>
                                <div className="text-4xl font-black text-slate-800"><span className="text-2xl mr-1">¥</span>{performanceData.actualCashFlow.toLocaleString()}</div>
                                </div>
                                <div className="text-right">
                            <div className="text-xs text-gray-400 font-bold mb-1">{t('annualLanding')}</div>
                            <div className="text-xl font-bold text-gray-600"><span className="text-sm mr-1">¥</span>{performanceData.expectedAnnualCashFlow.toLocaleString()}</div>
                            </div>

                                <XAxis dataKey="label" axisLine={false} tickLine={false} tick={{ fontSize: 12, fill: '#64748b' }} dy={10} />
                                <YAxis axisLine={false} tickLine={false} tick={{ fontSize: 12, fill: '#64748b' }} tickFormatter={(val) => val === 0 ? '0' : `${Math.abs(val) / 10000}万`} />

                                <ReferenceLine y={0} stroke="#cbd5e1" strokeWidth={2} />
                                <Bar dataKey="actualIncome" fill="#3b82f6" radius={[4, 4, 0, 0]} barSize={20} isAnimationActive={false} />
                                <Bar dataKey="actualExpense" fill="#f87171" radius={[0, 0, 4, 4]} barSize={20} isAnimationActive={false} />
                                <Bar dataKey="projectedIncome" fill="#bfdbfe" radius={[4, 4, 0, 0]} barSize={20} isAnimationActive={false} />
                                <Bar dataKey="projectedExpense" fill="#fecaca" radius={[0, 0, 4, 4]} barSize={20} isAnimationActive={false} />
                                <Line type="monotone" dataKey="actualTotal" stroke="#10b981" strokeWidth={3} dot={{ r: 4, fill: '#10b981', strokeWidth: 2, stroke: '#fff' }} connectNulls={false} isAnimationActive={false} />
                                <Line type="monotone" dataKey="projectedTotal" stroke="#6ee7b7" strokeWidth={3} strokeDasharray="5 5" dot={{ r: 4, fill: '#6ee7b7', strokeWidth: 2, stroke: '#fff' }} connectNulls={false} isAnimationActive={false} />
                            </ComposedChart>
                            </ResponsiveContainer>
                        </div>
                        <div className="flex justify-center gap-6 text-sm font-bold text-gray-500 mt-6 flex-wrap">
                                <div className="flex items-center gap-1.5">
                                    <div className="flex"><div className="w-3 h-3 rounded-l-full bg-blue-500"></div><div className="w-3 h-3 rounded-r-full bg-blue-200"></div></div>
                                    {t('incomeActProj')}
                                </div>
                                <div className="flex items-center gap-1.5">
                                    <div className="flex"><div className="w-3 h-3 rounded-l-full bg-red-400"></div><div className="w-3 h-3 rounded-r-full bg-red-200"></div></div>
                                    {t('expenseActProj')}
                                </div>
                                <div className="flex items-center gap-1.5">
                                    <div className="flex"><div className="w-4 h-1 bg-green-500 mt-1"></div><div className="w-4 h-1 border-t-2 border-dashed border-green-300 mt-1 ml-0.5"></div></div>
                                    {t('totalActProj')}
                                </div>
                            </div>
                            </div>
                            <div className="space-y-6">
                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
                                <div className="text-xs text-gray-500 font-bold mb-2">{t('grossYield')} <span className="text-[10px] font-normal text-gray-400">{t('expected')}</span></div>
                                <div className="text-3xl font-black text-slate-800">{performanceData.expectedGrossYield}<span className="text-lg text-gray-400 ml-1">%</span></div>
                                </div>
                                <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 border-l-4 border-l-indigo-500">
                                <div className="text-xs text-gray-500 font-bold mb-2">{t('netYield')} <span className="text-[10px] font-normal text-indigo-300">{t('expected')}</span></div>
                                <div className="text-3xl font-black text-indigo-700">{performanceData.expectedNetYield}<span className="text-lg text-indigo-300 ml-1">%</span></div>
                                </div>
                            </div>
                            <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-5">

                                </h3>

                                <div className="flex justify-between items-center">
                                    <span className="text-gray-500">{t('acquisitionPrice')}</span>

                                    <div className="font-bold text-blue-600">¥{performanceData.expectedAnnualIncome.toLocaleString()}</div>
                                    <div className="text-[10px] text-gray-400">{t('outOfActual')} ¥{performanceData.actualIncome.toLocaleString()}</div>
                                    </div>
                                </div>
                                <div className="flex justify-between items-center">
                                    <span className="text-gray-500 flex items-center gap-1"><ArrowDownRight size={14} className="text-red-400"/>{t('operatingExpense')}</span>
                                    <div className="text-right">
                                    <div className="font-bold text-red-500">¥{performanceData.expectedAnnualOperatingExpense.toLocaleString()}</div>
                                    <div className="text-[10px] text-gray-400">{t('outOfActual')} ¥{performanceData.actualOperatingExpense.toLocaleString()}</div>
                                    </div>
                                </div>
                                </div>
                            </div>
                            </div>
                        </div>
                    </div>
                    )}

                    {detailTab === 'ledger' && (
                    <div className="space-y-3 animate-in fade-in duration-300 pb-20">
                        <div className="p-4 bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
                        <span className="font-bold text-gray-800">{selectedYear}{t('fiscalYear')} {t('ledger')}</span>
                        <div className="text-xs text-gray-500 flex items-center gap-1"><Info size={14}/> {t('futureExclude')}</div>
                        </div>
                        
                        <div className="space-y-3">
                        {performanceData.tableData.map((stat) => {
                            const statId = `${stat.actualYear}-${stat.month}`;
                            const isExpanded = expandedStatId === statId;
                            const totalExpense = Number(stat.managementFee) + Number(stat.repairFee) + Number(stat.taxPayment);
                            
                            return (
                            <div key={statId} className={`rounded-xl shadow-sm border overflow-hidden transition-all ${stat.isPastOrCurrent ? 'bg-white border-gray-200' : 'bg-gray-50 border-gray-100 opacity-70'}`}>
                                <div 
                                className="p-4 flex justify-between items-center cursor-pointer hover:bg-gray-50 transition-colors"
                                onClick={() => setExpandedStatId(isExpanded ? null : statId)}
                                >
                                <div className="font-bold text-slate-800 flex items-center gap-2">
                                    {String(stat.actualYear).slice(2)}{t('year')}{stat.month}{t('month')}
                                    {!stat.isPastOrCurrent && <span className="text-[10px] bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded font-bold">{t('projected')}</span>}
                                </div>
                                <div className="flex items-center">
                                    <div className="flex flex-col items-end text-[11px] sm:flex-row sm:items-center sm:gap-4 sm:text-sm text-gray-600 mr-3">
                                    <span>{t('monthlyIncomeShort')} <span className="text-blue-600 font-bold">¥{Number(stat.rentIncome).toLocaleString()}</span></span>
                                    <span>{t('monthlyExpenseShort')} <span className="text-red-500 font-bold">¥{totalExpense.toLocaleString()}</span></span>
                                    </div>
                                    <div className="text-gray-400">
                                    {isExpanded ? <ChevronDown size={20} /> : <ChevronRight size={20} />}
                                    </div>
                                </div>
                                </div>

                                {isExpanded && (
                                <div className="p-4 sm:p-5 border-t border-gray-100 space-y-5 bg-gray-50/30">
                                    
                                    <button 
                                    onClick={() => confirmAutoFill(stat)}
                                    className="w-full bg-gradient-to-r from-blue-50 to-indigo-50 text-indigo-700 font-bold py-3 px-4 rounded-xl text-sm flex justify-center items-center gap-2 hover:from-blue-100 hover:to-indigo-100 transition-colors shadow-sm border border-indigo-100"
                                    >
                                    <Zap size={18} className="text-indigo-500 fill-indigo-200" /> 
                                    {t('oneButtonInput')} <span className="text-[10px] text-indigo-400 font-normal ml-1">{t('prevMonthInput')}</span>
                                    </button>

                                    <div>
                                    <h4 className="text-xs font-bold text-blue-600 mb-3 flex items-center gap-1"><ArrowUpRight size={14}/> {t('income')}</h4>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                        <label className="block text-[10px] text-gray-500 mb-1">{t('receiptDate')}</label>
                                        <input type="date" value={stat.receiptDate} onChange={(e) => handleUpdateStat(stat.actualYear, stat.month, 'receiptDate', e.target.value)} className="w-full px-3 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm bg-white" />
                                        </div>
                                        <div>
                                        <label className="block text-[10px] text-gray-500 mb-1 flex justify-between">
                                            {t('rentIncome')}
                                        </label>
                                        <input type="number" value={stat.rentIncome} onChange={(e) => handleUpdateStat(stat.actualYear, stat.month, 'rentIncome', e.target.value)} className="w-full px-3 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm bg-white font-bold" />
                                        </div>
                                    </div>
                                    </div>

                                    <div className="pt-2 border-t border-dashed border-gray-200">
                                    <h4 className="text-xs font-bold text-red-500 mb-3 flex items-center gap-1"><ArrowDownRight size={14}/> {t('expense')}</h4>
                                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
                                        <div className="col-span-2 sm:col-span-1">
                                        <label className="block text-[10px] text-gray-500 mb-1">{t('paymentDate')}</label>
                                        <input type="date" value={stat.paymentDate} onChange={(e) => handleUpdateStat(stat.actualYear, stat.month, 'paymentDate', e.target.value)} className="w-full px-3 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-red-500 outline-none text-sm bg-white" />
                                        </div>
                                        <div>
                                        <label className="block text-[10px] text-gray-500 mb-1">{t('managementFee')}</label>
                                        <input type="number" value={stat.managementFee} onChange={(e) => handleUpdateStat(stat.actualYear, stat.month, 'managementFee', e.target.value)} className="w-full px-3 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-red-500 outline-none text-sm bg-white" />
                                        </div>
                                        <div>
                                        <label className="block text-[10px] text-gray-500 mb-1">{t('repairFee')}</label>
                                        <input type="number" value={stat.repairFee} onChange={(e) => handleUpdateStat(stat.actualYear, stat.month, 'repairFee', e.target.value)} className="w-full px-3 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-red-500 outline-none text-sm bg-white" />
                                        </div>
                                        <div>
                                        <label className="block text-[10px] text-gray-500 mb-1">{t('taxPayment')}</label>
                                        <input type="number" value={stat.taxPayment} onChange={(e) => handleUpdateStat(stat.actualYear, stat.month, 'taxPayment', e.target.value)} className="w-full px-3 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-red-500 outline-none text-sm bg-white" />
                                        </div>
                                    </div>
                                    </div>

                                </div>
                                )}
                            </div>
                            );
                        })}
                        </div>
                    </div>
                    )}
                </div>
                );
            };

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-800">
                {currentView === 'home' && renderHome()}
                {currentView === 'settings' && renderSettings()}
                {currentView === 'form' && renderForm()}
                {currentView === 'detail' && renderDetail()}

                {/* 画面右下の通知トースト */}
                {syncMessage && (
                    <div className="fixed bottom-6 right-6 bg-gray-800 text-white px-6 py-3 rounded-xl shadow-2xl font-bold text-sm z-50 animate-in slide-in-from-bottom-5">
                        {syncMessage}
                    </div>
                )}

                {/* 汎用確認モーダル */}
                {confirmModal.isOpen && (
                    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4 animate-in fade-in">
                    <div className="bg-white rounded-2xl shadow-xl p-6 max-w-sm w-full animate-in zoom-in-95 duration-200">
                        <h3 className="text-lg font-black text-slate-800 mb-2">{confirmModal.title}</h3>
                        <p className="text-sm text-gray-600 mb-6 leading-relaxed">{confirmModal.message}</p>
                        <div className="flex justify-end gap-3">
                        <button 
                            onClick={() => setConfirmModal({ ...confirmModal, isOpen: false })} 
                            className="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg font-bold text-sm transition-colors"
                        >
                            {t('cancel')}
                        </button>
                        <button 
                            onClick={() => { confirmModal.onConfirm(); setConfirmModal({ ...confirmModal, isOpen: false }); }} 
                            className={`px-4 py-2 text-white rounded-lg font-bold text-sm transition-colors shadow-sm ${confirmModal.isDestructive ? 'bg-red-500 hover:bg-red-600' : 'bg-indigo-600 hover:bg-indigo-700'}`}
                        >
                            {t('execute')}
                        </button>
                        </div>
                    </div>
                    </div>
                )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
